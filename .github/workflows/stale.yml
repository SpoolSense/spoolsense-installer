name: Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # The 2026-07 audit found five accepted issues the bot closed
          # without them being implemented (#16, #21, #24, #27, #30) — they
          # sat as invisible gaps for months. Longer window, more exemptions.
          stale-issue-message: "This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 14 days if no further activity occurs. If this is still needed, comment or add the `accepted` label."
          stale-issue-label: "stale"
          days-before-stale: 120
          days-before-close: 14
          exempt-issue-labels: "P1-critical,P2-high,blocked,accepted,tracking"
